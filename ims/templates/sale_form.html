<h2>Create Sale</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Sale</button>
</form>

<div class="table-container">
    <table class="styled-table">
      <thead>
        <tr>
          <th>Id</th>
          <th>Product Name</th>
          <th>Quantity Sold</th>
          <th>Sale Date</th>
        </tr>
      </thead>
      <tbody>
        {% for x in mysales %}
          <tr>
            <td>{{ x.id }}</td>
            <td>{{ x.product }}</td>
            <td>{{ x.quantity_sold }}</td>
            <td>{{ x.sale_date }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
